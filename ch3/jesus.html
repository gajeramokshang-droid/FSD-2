
<!html>
<head>
  <style>
    .box {
      width: 200px;
      height: 100px;
      border: 2px solid black; /* Creates the border */
      padding: 10px;           /* Adds space inside the box */
      margin: 20px;            /* Adds space outside the box */
    }
  </style>
</head>
<body>
  <div class="box">
    This is a basic box with a border.
  </div>
</body>
</html>
